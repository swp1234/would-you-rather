    <div id="game-screen" class="screen active" tabindex="-1">
        <h1 class="app-title" data-i18n="app.title">Would You Rather</h1>
        <p class="app-subtitle" data-i18n="app.subtitle">Choose one — see what others picked!</p>

        <div class="progress-info">
            <span id="q-counter">1 / 20</span>
            <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
        </div>

        <div class="question-card" id="question-card">
            <div class="choice-container">
                <button class="choice-btn choice-a" id="choice-a">
                    <span class="choice-emoji" id="emoji-a"></span>
                    <span class="choice-text" id="text-a"></span>
                    <div class="choice-result hidden" id="result-a">
                        <div class="result-bar"><div class="result-fill" id="fill-a"></div></div>
                        <span class="result-pct" id="pct-a"></span>
                    </div>
                </button>

                <div class="or-divider"><span data-i18n="app.or">OR</span></div>

                <button class="choice-btn choice-b" id="choice-b">
                    <span class="choice-emoji" id="emoji-b"></span>
                    <span class="choice-text" id="text-b"></span>
                    <div class="choice-result hidden" id="result-b">
                        <div class="result-bar"><div class="result-fill" id="fill-b"></div></div>
                        <span class="result-pct" id="pct-b"></span>
                    </div>
                </button>
            </div>
        </div>

        <div class="stats-bar">
            <span data-i18n="app.answered">Answered</span>: <span id="answered-count">0</span>
        </div>
    </div>

    <!-- Summary Screen -->
    <div id="summary-screen" class="screen">
        <div class="summary-card">
            <div class="summary-emoji">🎉</div>
            <h2 class="summary-title" data-i18n="summary.title">You're Done!</h2>
            <p class="summary-desc" id="summary-desc"></p>

            <div class="summary-stats" id="summary-stats"></div>

            <div class="action-buttons">
                <button id="btn-share-summary" class="btn-action btn-share" data-i18n="summary.share">📤 Share</button>
                <button id="btn-play-again" class="btn-action btn-retry" data-i18n="summary.again">🔄 Play Again</button>
            </div>
        </div>
    </div>
